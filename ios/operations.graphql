### Schedule

query AllSessions {
  sessions {
    ...SessionFragment
  }
}

fragment SessionFragment on Session {
  id
  title
  description
  start
  end
  event_type
  room {
    name
    floor
  }
  speakers {
    ...SpeakerFragment
  }
  resources {
    name
    url
  }
}

### Speakers

query AllSpeakers {
  speakers {
    ...SpeakerFragment
  }
}

fragment SpeakerFragment on Speaker {
  id
  name
  about
  company
  position
  avatar
  socialUrls {
    service
    url
  }
}

### Sponsors

query GetSponsorGroups {
  sponsorGroups {
    name
    sponsors {
      name
      url
      logoLight
      logoDark
    }
  }
}

### Feedback

mutation SubmitFeedback($input: FeedbackInput!) {
  submitFeedback(feedbackInput: $input)
}
