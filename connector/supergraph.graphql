}
type Query {
  event(id: String!): SchedEvent
  session(id: String!): SchedSession
  venue(id: String!): SchedVenue
  speaker(id: String!): SchedSpeaker
  events(year: String, ids: [String!]): [SchedEvent!]!
  speakers(ids: [String!], company: String, username: String, nameLike: String): [SchedSpeaker!]
  venues(ids: [String!], nameLike: String): [SchedVenue!]!
  nearbyPlaces(includedTypes: [NearbyPlaceType!]!, maxResultCount: Int = 10, locationRestriction: LocationRestrictionInput!): [Place!]!
  place(id: String!): Place
}
type SchedEvent {
  id: String!
  name: String!
  year: String!
  start_date: String!
  end_date: String!
  city: String!
  location: LatLng!
