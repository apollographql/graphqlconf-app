query getNearbyPlaces(
  $types: [NearbyPlaceType!]! = [restaurant, cafe]
  $latitude: Float!
  $longitude: Float!
  $radiusInMeters: Int! = 500
) {
  nearbyPlaces(
    includedTypes: $types
    locationRestriction: {
      latitude: $latitude
      longitude: $longitude
      radiusInMeters: $radiusInMeters
    }
  ) {
    __typename
    id
    displayName {
      text
      languageCode
    }
    primaryTypeDisplayName {
      text
      languageCode
    }
    formattedAddress
    location {
      latitude
      longitude
    }
    viewport {
      low {
        latitude
        longitude
      }
      high {
        latitude
        longitude
      }
    }
  }
}
