cors:
  allow_any_origin: true
supergraph:
  listen: 0.0.0.0:4000
connectors:
  preview_connect_v0_3: true
  subgraphs:
    places:
      $config:
        api_key: ${env.GOOGLE_MAPS_API_KEY}
  sources:
    conferences.base:
      override_url: ${env.EXPO_HOST:-https://localhost:8081}/api/
    conferences.conf:
      override_url: ${env.EXPO_HOST:-https://localhost:8081}/api/conf/
telemetry:
  instrumentation:
    events:
      connector:
        request: info
        response: info
