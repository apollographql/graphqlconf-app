endpoint: https://localhost:4000

transport:
  type: streamable_http
  port: 5000
operations:
  source: local
  paths:
    - ./operations
schema:
  source: local
  path: supergraph.graphqls
overrides:
  mutation_mode: all
introspection:
  execute:
    enabled: true
  introspect:
    enabled: false
  search:
    enabled: false
