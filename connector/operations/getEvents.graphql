# Get a list of events (conferences, meetups etc.), optionally filtered by year or ids.
query GetEvents($year: String, $ids: [String!]) {
  events(year: $year, ids: $ids) {
    __typename
    id
    name
    year
    start_date
    end_date
    city
    location {
      __typename
      latitude
      longitude
    }
  }
}
