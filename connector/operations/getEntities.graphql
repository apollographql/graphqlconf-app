# Retrieves details for a list of entities, identified by their IDs and typenames. Supports multiple entity types and will return different result shapes for different types.
query GetEntities($identifiers: [EntityIdentifier!]!) {
  entities(identifiers: $identifiers) {
    ... on SchedEvent {
      __typename
      id
      name
      year
      start_date
      end_date
      city
    }

    ... on SchedSession {
      __typename
      id
      name
      start_time_ts
    }

    ... on SchedSpeaker {
      __typename
      id
      name
      company
    }

    ... on SchedVenue {
      __typename
      id
      venueName: name
    }

    ... on Place {
      __typename
      id
      displayName {
        __typename
        text
        languageCode
      }
      location {
        __typename
        latitude
        longitude
      }
      primaryTypeDisplayName {
        __typename
        text
        languageCode
      }
    }
  }
}
